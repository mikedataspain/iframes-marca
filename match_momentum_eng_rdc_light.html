const HOME_COLOR = '#d97706';
const AWAY_COLOR = '#2563eb';
const LINE_COLOR = 'rgba(15,23,42,0.55)';
const GRID_COLOR = 'rgba(15,23,42,0.10)';
const AXIS_COLOR = 'rgba(15,23,42,0.30)';
const HT_COLOR = 'rgba(100,116,139,0.65)';
const HT_LABEL_COLOR = '#64748b';
const TICK_COLOR = '#64748b';
const PILL_BG = 'rgba(244,244,248,0.95)';
const PILL_TEXT = '#0f172a';
const HALF_TINT = 'rgba(15,23,42,0.02)';
const CARD_COLOR_HOME = 'rgba(217,119,6,0.55)';
const CARD_COLOR_AWAY = 'rgba(37,99,235,0.55)';

const canvas = document.getElementById('momentum');
const wrap = document.getElementById('canvas-wrap');
const tooltip = document.getElementById('tooltip');

const CSS_W = 764, CSS_H = 440;
const DPR = 2;
canvas.width = CSS_W * DPR;
canvas.height = CSS_H * DPR;
const ctx = canvas.getContext('2d');
ctx.scale(DPR, DPR);

const PAD = { l:14, r:14, t:36, b:44 };
const plotW = CSS_W - PAD.l - PAD.r;
const plotH = CSS_H - PAD.t - PAD.b;
const midY = PAD.t + plotH/2;

function xForSec(sec) { return PAD.l + (sec / DATA.totalDur) * plotW; }
function yForNet(v) { return midY - v * (plotH/2) * 0.92; }
function minuteToSec(min) {
  if (min <= 45) return min * 60;
  return DATA.p1Dur + (min*60 - 45*60);
}

function draw() {
  ctx.clearRect(0,0,CSS_W,CSS_H);

  const htX = xForSec(DATA.p1Dur);
  ctx.fillStyle = HALF_TINT;
  ctx.fillRect(PAD.l, PAD.t, htX-PAD.l, plotH);
  ctx.fillRect(htX, PAD.t, (CSS_W-PAD.r)-htX, plotH);

  ctx.strokeStyle = GRID_COLOR;
  ctx.lineWidth = 1;
  ctx.setLineDash([4,4]);
  [0.5, -0.5].forEach(v => {
    const y = yForNet(v);
    ctx.beginPath(); ctx.moveTo(PAD.l, y); ctx.lineTo(CSS_W-PAD.r, y); ctx.stroke();
  });
  ctx.setLineDash([]);

  ctx.strokeStyle = AXIS_COLOR;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PAD.l, midY); ctx.lineTo(CSS_W-PAD.r, midY); ctx.stroke();

  ctx.strokeStyle = HT_COLOR;
  ctx.lineWidth = 1.4;
  ctx.setLineDash([6,5]);
  ctx.beginPath(); ctx.moveTo(htX, PAD.t); ctx.lineTo(htX, CSS_H-PAD.b); ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = HT_LABEL_COLOR;
  ctx.font = '700 11px Segoe UI, Arial';
  ctx.textAlign = 'center';
  ctx.fillText('DESCANSO', htX, PAD.t - 12);

  const pts = DATA.slots.map((sec, i) => ({ x: xForSec(sec), y: yForNet(DATA.net[i]) }));

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(pts[0].x, midY);
  pts.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(pts[pts.length-1].x, midY);
  ctx.closePath();
  ctx.clip();
  const gh = ctx.createLinearGradient(0, PAD.t, 0, midY);
  gh.addColorStop(0, 'rgba(217,119,6,0.65)');
  gh.addColorStop(1, 'rgba(217,119,6,0.05)');
  ctx.fillStyle = gh;
  ctx.fillRect(PAD.l, PAD.t, plotW, plotH/2);
  ctx.restore();

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(pts[0].x, midY);
  pts.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(pts[pts.length-1].x, midY);
  ctx.closePath();
  ctx.clip();
  const ga = ctx.createLinearGradient(0, midY, 0, CSS_H-PAD.b);
  ga.addColorStop(0, 'rgba(37,99,235,0.05)');
  ga.addColorStop(1, 'rgba(37,99,235,0.65)');
  ctx.fillStyle = ga;
  ctx.fillRect(PAD.l, midY, plotW, plotH/2);
  ctx.restore();

  ctx.beginPath();
  pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.strokeStyle = LINE_COLOR;
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';
  ctx.stroke();

  DATA.goals.forEach(g => {
    const x = xForSec(g.sec_real);
    const color = g.team === 'home' ? HOME_COLOR : AWAY_COLOR;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.moveTo(x, PAD.t); ctx.lineTo(x, CSS_H-PAD.b); ctx.stroke();

    const label = '⚽ ' + g.min + "'";
    ctx.font = '700 12px Segoe UI, Arial';
    const tw = ctx.measureText(label).width;
    const pillW = tw + 20, pillH = 22;
    const px = x - pillW/2, py = PAD.t - pillH - 4;
    ctx.fillStyle = PILL_BG;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.3;
    roundRect(ctx, px, py, pillW, pillH, 11);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = PILL_TEXT;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, x, py + pillH/2 + 1);
  });
  ctx.textBaseline = 'alphabetic';

  DATA.cards.forEach(c => {
    const x = xForSec(c.sec_real);
    ctx.strokeStyle = c.team === 'home' ? CARD_COLOR_HOME : CARD_COLOR_AWAY;
    ctx.lineWidth = 1.2;
    ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(x, PAD.t); ctx.lineTo(x, CSS_H-PAD.b); ctx.stroke();
    ctx.setLineDash([]);
  });

  ctx.fillStyle = TICK_COLOR;
  ctx.font = '600 11px Segoe UI, Arial';
  ctx.textAlign = 'center';
  [0,15,30,45,60,75,90].forEach(min => {
    const x = xForSec(minuteToSec(min));
    ctx.fillText(min + "'", x, CSS_H - PAD.b + 20);
  });
}

function roundRect(ctx,x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

draw();

DATA.goals.forEach(g => {
  const x = xForSec(g.sec_real);
  const hit = document.createElement('div');
  hit.className = 'goal-hit';
  hit.style.left = x + 'px';
  hit.style.top = (PAD.t) + 'px';
  hit.style.height = (CSS_H - PAD.t - PAD.b) + 'px';
  wrap.appendChild(hit);
  hit.addEventListener('mouseenter', () => {
    tooltip.innerHTML = '<span class="scorer">' + g.scorer + '</span><br>' + (g.team==='home' ? 'Inglaterra' : 'RD Congo') + " · " + g.min + "'" + (g.assist ? ('<br><span style=\"opacity:.7\">Asist.: ' + g.assist + '</span>') : '');
    tooltip.style.left = (x - 70) + 'px';
    tooltip.style.top = (PAD.t + 30) + 'px';
    tooltip.style.opacity = 1;
  });
  hit.addEventListener('mouseleave', () => { tooltip.style.opacity = 0; });
