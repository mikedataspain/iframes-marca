:5,"c":"e1vf7kzswllumuykwezkrbo70","o":1},{"t":13,"p":2,"m":71,"s":31,"c":"39d8zamp9tvg3wc51jxc2a1c0","o":1},{"t":49,"p":2,"m":71,"s":34,"c":"e1vf7kzswllumuykwezkrbo70","o":1},{"t":49,"p":2,"m":71,"s":46,"c":"39d8zamp9tvg3wc51jxc2a1c0","o":1},{"t":49,"p":2,"m":72,"s":31,"c":"e1vf7kzswllumuykwezkrbo70","o":1},{"t":49,"p":2,"m":72,"s":51,"c":"39d8zamp9tvg3wc51jxc2a1c0","o":1},{"t":16,"p":2,"m":73,"s":31,"c":"39d8zamp9tvg3wc51jxc2a1c0","o":1},{"t":49,"p":2,"m":77,"s":0,"c":"39d8zamp9tvg3wc51jxc2a1c0","o":1},{"t":49,"p":2,"m":77,"s":13,"c":"e1vf7kzswllumuykwezkrbo70","o":1},{"t":49,"p":2,"m":79,"s":27,"c":"39d8zamp9tvg3wc51jxc2a1c0","o":1},{"t":50,"p":2,"m":79,"s":28,"c":"39d8zamp9tvg3wc51jxc2a1c0","o":1},{"t":50,"p":2,"m":79,"s":31,"c":"e1vf7kzswllumuykwezkrbo70","o":1},{"t":49,"p":2,"m":79,"s":38,"c":"e1vf7kzswllumuykwezkrbo70","o":1},{"t":50,"p":2,"m":79,"s":55,"c":"e1vf7kzswllumuykwezkrbo70","o":1},{"t":49,"p":2,"m":79,"s":58,"c":"39d8zamp9tvg3wc51jxc2a1c0","o":1},{"t":49,"p":2,"m":80,"s":5,"c":"e1vf7kzswllumuykwezkrbo70","o":1},{"t":49,"p":2,"m":80,"s":10,"c":"39d8zamp9tvg3wc51jxc2a1c0","o":1},{"t":4,"p":2,"m":83,"s":6,"c":"e1vf7kzswllumuykwezkrbo70","o":1},{"t":4,"p":2,"m":83,"s":6,"c":"39d8zamp9tvg3wc51jxc2a1c0","o":0},{"t":16,"p":2,"m":85,"s":22,"c":"e1vf7kzswllumuykwezkrbo70","o":1},{"t":4,"p":2,"m":87,"s":35,"c":"e1vf7kzswllumuykwezkrbo70","o":1},{"t":4,"p":2,"m":87,"s":35,"c":"39d8zamp9tvg3wc51jxc2a1c0","o":0},{"t":49,"p":2,"m":89,"s":20,"c":"e1vf7kzswllumuykwezkrbo70","o":1},{"t":13,"p":2,"m":89,"s":47,"c":"e1vf7kzswllumuykwezkrbo70","o":1},{"t":49,"p":2,"m":90,"s":34,"c":"e1vf7kzswllumuykwezkrbo70","o":1},{"t":49,"p":2,"m":90,"s":52,"c":"39d8zamp9tvg3wc51jxc2a1c0","o":1},{"t":49,"p":2,"m":91,"s":1,"c":"e1vf7kzswllumuykwezkrbo70","o":1},{"t":49,"p":2,"m":91,"s":15,"c":"39d8zamp9tvg3wc51jxc2a1c0","o":1},{"t":4,"p":2,"m":91,"s":44,"c":"e1vf7kzswllumuykwezkrbo70","o":1},{"t":4,"p":2,"m":91,"s":44,"c":"39d8zamp9tvg3wc51jxc2a1c0","o":0},{"t":49,"p":2,"m":93,"s":21,"c":"39d8zamp9tvg3wc51jxc2a1c0","o":1},{"t":49,"p":2,"m":93,"s":26,"c":"e1vf7kzswllumuykwezkrbo70","o":1},{"t":49,"p":2,"m":93,"s":48,"c":"e1vf7kzswllumuykwezkrbo70","o":1},{"t":49,"p":2,"m":94,"s":19,"c":"e1vf7kzswllumuykwezkrbo70","o":1},{"t":50,"p":2,"m":94,"s":21,"c":"e1vf7kzswllumuykwezkrbo70","o":1},{"t":49,"p":2,"m":94,"s":23,"c":"39d8zamp9tvg3wc51jxc2a1c0","o":1},{"t":4,"p":2,"m":94,"s":35,"c":"39d8zamp9tvg3wc51jxc2a1c0","o":1},{"t":4,"p":2,"m":94,"s":35,"c":"e1vf7kzswllumuykwezkrbo70","o":0},{"t":15,"p":2,"m":95,"s":41,"c":"39d8zamp9tvg3wc51jxc2a1c0","o":1},{"t":6,"p":2,"m":95,"s":43,"c":"39d8zamp9tvg3wc51jxc2a1c0","o":1},{"t":6,"p":2,"m":95,"s":43,"c":"e1vf7kzswllumuykwezkrbo70","o":0},{"t":49,"p":2,"m":96,"s":37,"c":"39d8zamp9tvg3wc51jxc2a1c0","o":1},{"t":6,"p":2,"m":97,"s":0,"c":"39d8zamp9tvg3wc51jxc2a1c0","o":1},{"t":6,"p":2,"m":97,"s":0,"c":"e1vf7kzswllumuykwezkrbo70","o":0},{"t":13,"p":2,"m":97,"s":36,"c":"39d8zamp9tvg3wc51jxc2a1c0","o":1}];

const GOALS_META = [
  { sec: 38*60+47,                       min: 39, scorer: 'A. Nusa',    team: AWAY },
  { sec: P1_DUR + (73*60+31 - 45*60),   min: 74, scorer: 'A. Diallo',  team: HOME },
  { sec: P1_DUR + (85*60+22 - 45*60),   min: 86, scorer: 'E. Haaland', team: AWAY },
];

// ── Momentum calc ────────────────────────────────────────────────────────────
const WINDOW = 3 * 60;
const STEP   = 10;
const SLOTS  = Math.ceil(TOTAL_DUR / STEP) + 1;

const scored = RAW.map(e => {
  let w = WEIGHTS[e.t] || 0;
  if (e.t === 6  && e.o !== 1) w = 0;
  if (e.t === 50) w = -w;
  if (e.t === 4 && e.o === 0) w = -w;
  return { sec: eventToSec(e), team: e.c, score: w };
});

const moHome = new Float32Array(SLOTS);
const moAway = new Float32Array(SLOTS);
for (let i = 0; i < SLOTS; i++) {
  const t = i * STEP, t0 = t - WINDOW;
  let sh = 0, sa = 0;
  for (const ev of scored) {
    if (ev.sec >= t0 && ev.sec <= t) {
      const age = (t - ev.sec) / WINDOW;
      const w   = ev.score * Math.exp(-2.5 * age);
      if (ev.team === HOME) sh += w; else sa += w;
    }
  }
  moHome[i] = sh; moAway[i] = sa;
}

let maxVal = 0;
for (let i = 0; i < SLOTS; i++) maxVal = Math.max(maxVal, Math.abs(moHome[i]), Math.abs(moAway[i]));
if (maxVal === 0) maxVal = 1;
const net = Array.from(moHome).map((h, i) => (h - moAway[i]) / maxVal);

// Lighter smoothing → more aggressive curves
function smooth(arr, r) {
  const out = new Array(arr.length);
  for (let i = 0; i < arr.length; i++) {
    let sum = 0, wsum = 0;
    for (let j = Math.max(0, i-r); j <= Math.min(arr.length-1, i+r); j++) {
      const g = Math.exp(-0.5 * ((i-j)/r) ** 2);
      sum += arr[j] * g; wsum += g;
    }
    out[i] = sum / wsum;
  }
  return out;
}
const smoothed = smooth(net, 7);

// ── Canvas setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('chart');
const CSS_W  = 764;  // inner width (820 card - 28*2 padding)
const CSS_H  = 440;  // taller → more square overall card
canvas.style.width  = CSS_W + 'px';
canvas.style.height = CSS_H + 'px';
canvas.width  = CSS_W * 2;
canvas.height = CSS_H * 2;
const ctx = canvas.getContext('2d');
ctx.scale(2, 2);

const PAD  = { l: 14, r: 14, t: 36, b: 44 };
const PW   = CSS_W - PAD.l - PAD.r;
const PH   = CSS_H - PAD.t - PAD.b;
const midY = PAD.t + PH / 2;

const xOfSec  = s  => PAD.l + (s / TOTAL_DUR) * PW;
const xOfSlot = i  => xOfSec(i * STEP);
const yOfNet  = v  => midY - v * (PH / 2) * 0.88;

// ── Half backgrounds ──
const htX = xOfSec(P1_DUR);
[[PAD.l, htX - PAD.l], [htX, PAD.l + PW - htX]].forEach(([x, w], idx) => {
  const g = ctx.createLinearGradient(x, 0, x + w, 0);
  g.addColorStop(0,   'rgba(50,10,100,0.0)');
  g.addColorStop(0.5, 'rgba(50,10,100,0.25)');
  g.addColorStop(1,   'rgba(50,10,100,0.0)');
  ctx.fillStyle = g; ctx.fillRect(x, PAD.t, w, PH);
});

// ── Grid lines ──
ctx.setLineDash([3, 5]);
ctx.strokeStyle = 'rgba(255,255,255,0.07)';
ctx.lineWidth   = 1;
[-0.5, 0.5].forEach(v => {
  ctx.beginPath();
  ctx.moveTo(PAD.l, yOfNet(v)); ctx.lineTo(PAD.l + PW, yOfNet(v));
  ctx.stroke();
});
ctx.setLineDash([]);

// ── Centre axis ──
ctx.strokeStyle = 'rgba(255,255,255,0.18)';
ctx.lineWidth   = 1;
ctx.beginPath(); ctx.moveTo(PAD.l, midY); ctx.lineTo(PAD.l + PW, midY); ctx.stroke();

// ── Half-time divider ──
ctx.setLineDash([4, 4]);
ctx.strokeStyle = 'rgba(153,102,204,0.6)';
ctx.lineWidth   = 1;
ctx.beginPath(); ctx.moveTo(htX, PAD.t - 10); ctx.lineTo(htX, PAD.t + PH + 8); ctx.stroke();
ctx.setLineDash([]);
ctx.fillStyle = '#9966cc'; ctx.font = '700 10px Segoe UI'; ctx.textAlign = 'center';
ctx.fillText('DESCANSO', htX, PAD.t - 2);

// ── Minute labels ──
[0,15,30,45,60,75,90].forEach(m => {
  const sec = m <= 45 ? m * 60 : P1_DUR + (m - 45) * 60;
  if (sec > TOTAL_DUR) return;
  const x = xOfSec(sec);
  ctx.strokeStyle = 'rgba(153,102,204,0.3)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x, PAD.t + PH + 3); ctx.lineTo(x, PAD.t + PH + 8); ctx.stroke();
  ctx.fillStyle = 'rgba(200,160,255,0.75)'; ctx.font = '9px Segoe UI'; ctx.textAlign = 'center';
  ctx.fillText(m + "'", x, PAD.t + PH + 20);
});

// ── HOME fill (positive = above axis) — magenta ──
ctx.save();
ctx.beginPath();
ctx.moveTo(xOfSlot(0), midY);
for (let i = 0; i < smoothed.length; i++) ctx.lineTo(xOfSlot(i), yOfNet(Math.max(0, smoothed[i])));
ctx.lineTo(xOfSlot(smoothed.length - 1), midY);
ctx.closePath();
const gHome = ctx.createLinearGradient(0, PAD.t, 0, midY);
gHome.addColorStop(0,   'rgba(255,20,147,0.92)');
gHome.addColorStop(0.5, 'rgba(255,20,147,0.55)');
gHome.addColorStop(1,   'rgba(255,20,147,0.04)');
ctx.fillStyle = gHome; ctx.fill();
ctx.restore();

// ── AWAY fill (negative = below axis) — cyan ──
ctx.save();
ctx.beginPath();
ctx.moveTo(xOfSlot(0), midY);
for (let i = 0; i < smoothed.length; i++) ctx.lineTo(xOfSlot(i), yOfNet(Math.min(0, smoothed[i])));
ctx.lineTo(xOfSlot(smoothed.length - 1), midY);
ctx.closePath();
const gAway = ctx.createLinearGradient(0, midY, 0, PAD.t + PH);
gAway.addColorStop(0,   'rgba(0,229,255,0.04)');
gAway.addColorStop(0.5, 'rgba(0,229,255,0.55)');
gAway.addColorStop(1,   'rgba(0,229,255,0.92)');
ctx.fillStyle = gAway; ctx.fill();
ctx.restore();

// ── Momentum line ──
ctx.save();
ctx.beginPath();
for (let i = 0; i < smoothed.length; i++) {
  i === 0 ? ctx.moveTo(xOfSlot(i), yOfNet(smoothed[i])) : ctx.lineTo(xOfSlot(i), yOfNet(smoothed[i]));
}
ctx.strokeStyle = 'rgba(255,255,255,0.55)';
ctx.lineWidth   = 1.5;
ctx.lineJoin    = 'round';
ctx.stroke();
ctx.restore();

// ── Goal markers: vertical line + pill at top ──
const goalHitAreas = [];
GOALS_META.forEach(g => {
  const x      = xOfSec(g.sec);
  const isHome = g.team === HOME;
  const color  = isHome ? '#ff1493' : '#00e5ff';
  const label  = '⚽ ' + g.min + "'";

  // Vertical line
  ctx.save();
  ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.9;
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(x, PAD.t + 22); ctx.lineTo(x, PAD.t + PH); ctx.stroke();
  ctx.restore();

  // Pill at top
  ctx.save();
  ctx.font = '700 10px Segoe UI';
  const tw   = ctx.measureText(label).width;
  const pw   = tw + 10;
  const ph   = 17;
  const px   = Math.min(Math.max(x - pw / 2, PAD.l), PAD.l + PW - pw);
  const py   = PAD.t + 2;

  // Pill background
  ctx.fillStyle = 'rgba(26,6,56,0.88)';
  ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 4); ctx.fill();
  // Pill border
  ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.globalAlpha = 1;
  ctx.stroke();
  // Text
  ctx.fillStyle = '#ffffff'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(label, px + 5, py + ph / 2);
  ctx.restore();

  goalHitAreas.push({ x, min: g.min, scorer: g.scorer, isHome, color });
});

// ── Border ──
ctx.strokeStyle = 'rgba(153,102,204,0.18)'; ctx.lineWidth = 1;
ctx.strokeRect(PAD.l, PAD.t, PW, PH);

// ── Tooltip interaction ──
const tooltip = document.getElementById('tooltip');
const wrap    = canvas.parentElement;

canvas.addEventListener('mousemove', ev => {
  const rect  = canvas.getBoundingClientRect();
  const mx    = (ev.clientX - rect.left) * (CSS_W / rect.width);
  const my    = (ev.clientY - rect.top)  * (CSS_H / rect.height);

  let hit = null;
  for (const g of goalHitAreas) {
    if (Math.abs(mx - g.x) < 14) { hit = g; break; }
  }
  if (hit) {
    const teamName = hit.isHome ? 'Costa de Marfil' : 'Noruega';
    tooltip.innerHTML = `<span style="color:${hit.color};font-weight:700">⚽ ${hit.min}' — ${hit.scorer}</span><br><span style="color:#9966cc;font-size:10px">${teamName}</span>`;
    tooltip.style.display = 'block';
    const cx = canvas.getBoundingClientRect().left - wrap.getBoundingClientRect().left + hit.x * (rect.width / CSS_W);
    tooltip.style.left = cx + 'px';
    tooltip.style.top  = (PAD.t * (rect.height / CSS_H) - 52) + 'px';
    canvas.style.cursor = 'crosshair';
  } else {
    tooltip.style.display = 'none';
    canvas.style.cursor = 'default';
  }
});
canvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
</script>
